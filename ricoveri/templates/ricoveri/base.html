<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}Servizio Sanitario{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-semibold text-success" href="{% url 'home' %}">
      Servizio Sanitario
    </a>

    <div class="navbar-nav">
	  <a class="nav-link {% if request.resolver_match.url_name == 'cittadini_list' or request.resolver_match.url_name == 'home' %}active fw-semibold text-success{% endif %}" href="{% url 'cittadini_list' %}">
	    Cittadini
	  </a>
	  <a class="nav-link {% if request.resolver_match.url_name == 'ospedali_list' %}active fw-semibold text-success{% endif %}" href="{% url 'ospedali_list' %}">
	    Ospedali
	  </a>
	</div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}
  {% endblock %}
</main>

<footer class="border-top bg-white py-3 mt-5">
  <div class="container d-flex justify-content-between small text-muted">
    <span>Servizio Sanitario Nazionale — Gestione Ricoveri Ospedalieri</span>
    <span>Disclaimer — Questo sito è stato realizzato come progetto d’esame</span>
    <span>Unibg</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
